name: Release

# Publishes @toon-protocol/core and @toon-protocol/sdk to npm via changesets.
# Auth comes from the org-level NPM_TOKEN secret (no local `npm login`).
# changesets rewrites `workspace:*` -> the real version at publish time.
#
# The Release PR is opened with the org GitHub App token (APP_ID/APP_PRIVATE_KEY),
# NOT the default GITHUB_TOKEN: the org forbids GitHub Actions from creating PRs
# ("GitHub Actions is not permitted to create or approve pull requests"), and that
# policy can't be overridden per-repo. An App is a distinct actor, so its PRs are
# exempt. If the App isn't installed the token step is skipped and we fall back to
# GITHUB_TOKEN (publish still works; only the Release-PR step would be blocked).

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        continue-on-error: true # App not installed -> fall back to GITHUB_TOKEN
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # When a new client-mcp version is actually published, package it as a
      # Claude Desktop extension (.mcpb) and attach it to the GitHub Release that
      # changesets created for the `@toon-protocol/client-mcp@<version>` tag.
      # Same server as the Claude Code plugin — this is the Desktop install path.
      # Gated on `published` so it never runs on a plain Release-PR-update push.
      - name: Build & attach Desktop extension (.mcpb)
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '@toon-protocol/client-mcp')
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(echo "$PUBLISHED" | jq -r '.[] | select(.name=="@toon-protocol/client-mcp") | .version')
          if [ -z "$VERSION" ]; then echo "client-mcp not in published set; skipping"; exit 0; fi
          echo "Packaging .mcpb for @toon-protocol/client-mcp@$VERSION"
          OUT="toon-$VERSION.mcpb"
          # dist/ is already built by the `pnpm -r build` step above.
          node packages/client-mcp/scripts/build-mcpb.mjs --out "$OUT"
          TAG="@toon-protocol/client-mcp@$VERSION"
          # changesets opens the Release for this tag; wait briefly for it to
          # appear, then attach the asset (create the Release if it's absent).
          for i in 1 2 3 4 5; do
            gh release view "$TAG" >/dev/null 2>&1 && break
            echo "waiting for release $TAG ($i/5)…"; sleep 5
          done
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$OUT" --clobber
          else
            gh release create "$TAG" "$OUT" \
              --title "$TAG" \
              --notes "Claude Desktop extension (.mcpb) for client-mcp $VERSION — install via Settings → Extensions → Advanced → Install Extension."
          fi

          # Maintain a stable, version-less download URL by re-pointing the
          # `mcpb-latest` release at this build. The ugly auto-tag
          # (`@toon-protocol/client-mcp@<ver>`) keeps the pinned/versioned asset;
          # this gives a clean permanent link:
          #   …/releases/download/mcpb-latest/toon.mcpb
          # `--latest=false` so it never steals the repo's "Latest" badge from
          # the real version releases.
          cp "$OUT" toon.mcpb
          gh release delete mcpb-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create mcpb-latest toon.mcpb \
            --target "$GITHUB_SHA" \
            --latest=false \
            --title "TOON Desktop extension — latest" \
            --notes "Always the newest client-mcp .mcpb (currently $VERSION). Stable download: https://github.com/${GITHUB_REPOSITORY}/releases/download/mcpb-latest/toon.mcpb — install via Claude Desktop → Settings → Extensions → Advanced → Install Extension."

      - name: Upload .mcpb as workflow artifact
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '@toon-protocol/client-mcp')
        uses: actions/upload-artifact@v4
        with:
          name: toon-mcpb
          path: toon-*.mcpb
          if-no-files-found: warn
