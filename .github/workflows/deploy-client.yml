name: Deploy Headless Client (Linode)

# Provisions/updates the egress-only client host with Terraform, then deploys: installs
# the pinned client-mcp CLI, ships the headless Agent SDK runner, writes the runtime
# secrets (keystore password + Anthropic key) to a root-only file on the box, and
# restarts toon-clientd. The journey runner is NOT started automatically (it spends
# funds + tokens) — set run_journey to trigger one oneshot run.
#
# The treasury/keystore seed is never handled here: the keystore is created once on the
# box (docs/deploy-linode-client.md); CI only passes the unlock password.

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:
    inputs:
      apply_infra:
        description: 'Run `terraform apply` (provision/update the box)'
        type: boolean
        default: false
      run_journey:
        description: 'Trigger one headless journey run after deploy'
        type: boolean
        default: false
      journey_mode:
        description: 'Journey mode when run_journey is set'
        type: choice
        options: [smoke, full]
        default: smoke

concurrency:
  group: deploy-client
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJ_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJ_SECRET_KEY }}
      TF_VAR_ssh_pubkey: ${{ vars.CLIENT_SSH_PUBKEY }}
      TF_VAR_allowed_ssh_cidr: ${{ vars.ALLOWED_SSH_CIDR }}
      TF_VAR_region: ${{ vars.LINODE_REGION }}
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Pin client version from infra/client-version.txt
        working-directory: .
        run: echo "CLIENT_VERSION=$(tr -d '[:space:]' < infra/client-version.txt)" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=client/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="endpoints={s3=\"${{ vars.TF_STATE_ENDPOINT }}\"}"

      - name: Terraform fmt + validate
        run: |
          terraform fmt -check
          terraform validate

      - name: Terraform apply
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply_infra)
        env:
          TF_VAR_client_version: ${{ env.CLIENT_VERSION }}
        run: terraform apply -auto-approve -input=false

      - name: Resolve instance IP
        id: ip
        run: echo "ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        working-directory: .
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.CLIENT_SSH_KEY }}" > ~/.ssh/client_deploy
          chmod 600 ~/.ssh/client_deploy
          for i in $(seq 1 10); do
            ssh-keyscan -T 10 "${{ steps.ip.outputs.ip }}" >> ~/.ssh/known_hosts 2>/dev/null && break || sleep 6
          done

      - name: Ship headless runner
        working-directory: .
        run: |
          scp -i ~/.ssh/client_deploy -r infra/headless/. \
            "deploy@${{ steps.ip.outputs.ip }}:/opt/toon-headless/"

      - name: Deploy (install CLI + secrets + restart daemon)
        working-directory: .
        env:
          KEYSTORE_PW: ${{ secrets.TOON_CLIENT_KEYSTORE_PASSWORD }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          JOURNEY_MODE: ${{ inputs.journey_mode || 'smoke' }}
        run: |
          ssh -i ~/.ssh/client_deploy "deploy@${{ steps.ip.outputs.ip }}" 'bash -s' <<EOF
          set -euo pipefail
          sudo npm install -g @toon-protocol/client-mcp@${CLIENT_VERSION}
          npm --prefix /opt/toon-headless install --no-audit --no-fund
          # Runtime secrets (root-only on the box; seed/mnemonic NOT included).
          umask 077
          cat > /etc/toon-client.secrets <<SEC
          TOON_CLIENT_KEYSTORE_PASSWORD=${KEYSTORE_PW}
          CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
          TOON_JOURNEY=${JOURNEY_MODE}
          SEC
          chmod 600 /etc/toon-client.secrets
          set -a; . /etc/toon-client.env; set +a
          if [ ! -f "\$TOON_CLIENT_CONFIG" ]; then
            echo "::error::\$TOON_CLIENT_CONFIG not found — run the one-time bootstrap (docs/deploy-linode-client.md) before deploying." >&2
            exit 1
          fi
          sudo systemctl daemon-reload
          sudo systemctl restart toon-clientd
          EOF

      - name: Run journey (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_journey
        working-directory: .
        run: |
          ssh -i ~/.ssh/client_deploy "deploy@${{ steps.ip.outputs.ip }}" \
            'sudo systemctl start toon-headless && sleep 2 && journalctl -u toon-headless -n 40 --no-pager'

      - name: Health gate (toon-clientd active)
        working-directory: .
        run: |
          ssh -i ~/.ssh/client_deploy "deploy@${{ steps.ip.outputs.ip }}" \
            'systemctl is-active toon-clientd'
