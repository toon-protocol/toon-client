name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changeset:
    name: Changeset check
    runs-on: ubuntu-latest
    # Only meaningful on PRs; push-to-main runs after merge so skip there.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require changeset when publishable packages change
        run: |
          PUBLISHABLE="packages/client packages/client-mcp packages/views packages/rig packages/arweave"
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          needs_changeset=false
          for pkg in $PUBLISHABLE; do
            if echo "$changed" | grep -q "^${pkg}/"; then
              needs_changeset=true
              break
            fi
          done
          if [ "$needs_changeset" = "true" ]; then
            new_changesets=$(echo "$changed" | grep -c "^\.changeset/.*\.md$" || true)
            if [ "$new_changesets" -eq 0 ]; then
              echo "::error::This PR modifies a publishable package but includes no changeset."
              echo "Run 'pnpm changeset' and commit the generated .changeset/*.md file."
              exit 1
            fi
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      # First step: the gate no-regression guard (below) measures wall-clock
      # against the frozen `.sandcastle/gate-baseline.json`, which was
      # captured as this job's TOTAL duration (checkout through test) — so
      # timing must start here, before checkout, to stay comparable.
      - name: Record gate start time
        id: gate-start
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # JSON output (not human-readable "stylish") so the gate guard can
      # parse exact error/warning counts. continue-on-error: the frozen
      # baseline debt (16 errors / 718 warnings) shouldn't block the job by
      # itself — the guard step below is the real pass/fail authority.
      - name: Lint
        run: npx eslint . -f json -o /tmp/eslint-report.json
        continue-on-error: true

      - run: pnpm -r build

      # Typecheck previously had NO CI step at all (soft-gated in agent
      # instructions only) — a genuine false-PASS hole (toon-client#433).
      # continue-on-error for the same reason as lint: the 75 frozen
      # pre-existing errors (#423) shouldn't block the job; the guard does.
      - name: Typecheck
        run: pnpm -r --no-bail run typecheck 2>&1 | tee /tmp/typecheck.log
        continue-on-error: true

      - run: pnpm -r test --if-present

      - name: Gate no-regression guard
        run: |
          END=$(date +%s)
          WALL_CLOCK=$((END - ${{ steps.gate-start.outputs.start }}))
          RUNNER_MINUTES=$(awk "BEGIN { printf \"%.4f\", $WALL_CLOCK / 60 }")
          echo "Gate wall-clock: ${WALL_CLOCK}s (${RUNNER_MINUTES} runner-minutes)"
          npx tsx .sandcastle/gate-guard.ts \
            --eslint-json=/tmp/eslint-report.json \
            --typecheck-log=/tmp/typecheck.log \
            --wall-clock-seconds="$WALL_CLOCK" \
            --runner-minutes="$RUNNER_MINUTES"

  devbox-validate:
    name: Devbox Environment Validation
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Assert tool versions
        run: |
          cat > "${RUNNER_TEMP:-/tmp}/assert-versions.sh" <<'ASSERT'
          set -euo pipefail
          node --version | grep -E '^v22\.'
          pnpm --version | grep -E '^8\.15\.9$'
          ASSERT
          devbox run -- bash "${RUNNER_TEMP:-/tmp}/assert-versions.sh"
          echo "✅ All devbox tools resolved at expected versions"

      - name: Smoke build
        run: devbox run -- bash -c "pnpm install --no-frozen-lockfile && pnpm build"
