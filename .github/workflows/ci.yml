name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true
        env:
          DEVBOX_USE_VERSION: "0.17.3"
          COREPACK_ENABLE_STRICT: "0"

      - run: devbox run -- pnpm install --no-frozen-lockfile

      - run: devbox run -- pnpm lint
        continue-on-error: true

      - run: devbox run -- pnpm -r build

      - run: devbox run -- pnpm -r test --if-present
