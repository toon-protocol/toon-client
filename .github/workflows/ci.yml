name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true

      - run: devbox run -- pnpm install --frozen-lockfile

      - run: devbox run -- pnpm lint
        continue-on-error: true

      - run: devbox run -- pnpm -r build

      - run: devbox run -- pnpm -r test --if-present

  devbox-validate:
    runs-on: ubuntu-latest
    continue-on-error: true        # a Nix-resolution or push hiccup must not gate the PR
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true
      - name: Resolve devbox.lock
        run: devbox install
      - name: Commit devbox.lock if changed
        # skip on forks: GITHUB_TOKEN is read-only there, so the push would 403
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git add devbox.lock
          if ! git diff --staged --quiet -- devbox.lock; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "ci: pin devbox.lock"
            git push
          fi